<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - Centric</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;color:#f8fafc;font-family:Arial,Helvetica,sans-serif}
    .login-card{width:min(430px,calc(100% - 32px));background:#172033;border:1px solid #26344f;border-radius:22px;padding:32px;box-shadow:0 24px 80px rgba(0,0,0,.38)}
    .login-brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}.login-brand img{height:38px}.login-brand strong{font-size:22px}
    label{display:block;margin:14px 0 7px;color:#cbd5e1;font-size:14px}.field{width:100%;box-sizing:border-box;padding:13px 14px;border-radius:12px;border:1px solid #334155;background:#0f172a;color:white;outline:none}
    .btn{width:100%;margin-top:20px;padding:13px 16px;border:0;border-radius:12px;background:#622A83;color:white;font-weight:800;cursor:pointer}.muted{color:#94a3b8;font-size:13px;line-height:1.45}.error{display:none;margin-top:16px;padding:12px;border-radius:12px;background:#7f1d1d;color:#fee2e2}.ok{display:none;margin-top:16px;padding:12px;border-radius:12px;background:#14532d;color:#dcfce7}
  </style>
</head>
<body>
  <main class="login-card">
    <div class="login-brand"><img src="/assets/logo.png" alt="Centric"><strong>Centric</strong></div>
    <p class="muted">Primeiro acesso local: admin/admin. Após o primeiro login, a troca da senha é obrigatória. Usuários AD continuam sendo validados diretamente no Active Directory.</p>
    <form id="loginForm">
      <label for="username">Usuário AD</label>
      <input class="field" id="username" autocomplete="username" placeholder="usuario@dominio.local ou DOMINIO\usuario" required>
      <label for="password">Senha</label>
      <input class="field" id="password" type="password" autocomplete="current-password" required>
      <button class="btn" type="submit">Entrar</button>
    </form>
    <div class="error" id="errorBox"></div>
    <div class="ok" id="okBox">Autenticado. Redirecionando...</div>
  </main>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const errorBox = document.getElementById('errorBox');
  const okBox = document.getElementById('okBox');
  errorBox.style.display='none'; okBox.style.display='none';
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  try{
    const res = await fetch('/api/auth/login', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username,password})});
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.detail || 'Falha no login.');
    okBox.style.display='block';
    setTimeout(()=>{ window.location.href = data.redirect_to || '/'; }, 500);
  }catch(err){
    errorBox.textContent = err.message || String(err);
    errorBox.style.display='block';
  }
});
</script>
</body>
</html>
