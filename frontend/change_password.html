<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Trocar senha - Centric</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;color:#f8fafc;font-family:Arial,Helvetica,sans-serif}
    .login-card{width:min(460px,calc(100% - 32px));background:#172033;border:1px solid #26344f;border-radius:22px;padding:32px;box-shadow:0 24px 80px rgba(0,0,0,.38)}
    .login-brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}.login-brand img{height:38px}.login-brand strong{font-size:22px}
    label{display:block;margin:14px 0 7px;color:#cbd5e1;font-size:14px}.field{width:100%;box-sizing:border-box;padding:13px 14px;border-radius:12px;border:1px solid #334155;background:#0f172a;color:white;outline:none}
    .btn{width:100%;margin-top:20px;padding:13px 16px;border:0;border-radius:12px;background:#622A83;color:white;font-weight:800;cursor:pointer}.muted{color:#94a3b8;font-size:13px;line-height:1.45}.error{display:none;margin-top:16px;padding:12px;border-radius:12px;background:#7f1d1d;color:#fee2e2}.ok{display:none;margin-top:16px;padding:12px;border-radius:12px;background:#14532d;color:#dcfce7}
  </style>
</head>
<body>
  <main class="login-card">
    <div class="login-brand"><img src="/assets/logo.png" alt="Centric"><strong>Centric</strong></div>
    <p class="muted">Troca obrigatória da senha local inicial. A nova senha será armazenada apenas como hash seguro no PostgreSQL.</p>
    <form id="changeForm">
      <label for="current_password">Senha atual</label>
      <input class="field" id="current_password" type="password" autocomplete="current-password" required>
      <label for="new_password">Nova senha</label>
      <input class="field" id="new_password" type="password" autocomplete="new-password" minlength="8" required>
      <label for="confirm_password">Confirmar nova senha</label>
      <input class="field" id="confirm_password" type="password" autocomplete="new-password" minlength="8" required>
      <button class="btn" type="submit">Salvar nova senha</button>
    </form>
    <div class="error" id="errorBox"></div>
    <div class="ok" id="okBox">Senha alterada. Redirecionando...</div>
  </main>
<script>
document.getElementById('changeForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const errorBox = document.getElementById('errorBox');
  const okBox = document.getElementById('okBox');
  errorBox.style.display='none'; okBox.style.display='none';
  const current_password = document.getElementById('current_password').value;
  const new_password = document.getElementById('new_password').value;
  const confirm_password = document.getElementById('confirm_password').value;
  try{
    const res = await fetch('/api/auth/change-password', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({current_password,new_password,confirm_password})});
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.detail || 'Falha ao alterar senha.');
    okBox.style.display='block';
    setTimeout(()=>{ window.location.href = data.redirect_to || '/'; }, 500);
  }catch(err){
    errorBox.textContent = err.message || String(err);
    errorBox.style.display='block';
  }
});
</script>
</body>
</html>
