services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: centric_app
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8443}:8443"
    depends_on:
      - db
    volumes:
      - ./license:/app/license
      - ./backend/logs:/app/backend/logs
    networks:
      - public_net
      - backend_net
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: centric_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-centric_db}
      POSTGRES_USER: ${POSTGRES_USER:-centric_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    expose:
      - "5432"
    volumes:
      - centric_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend_net
    restart: unless-stopped

volumes:
  centric_pgdata:

networks:
  public_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true
